name : RideShare
services:
    redis:
        image: redis:7-alpine
        container_name: ride-share-redis
        command: ['redis-server', '--appendonly', 'yes']
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data

    mongo:
        image: mongo:7
        container_name: ride-share-mongo
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_DATABASE: ride-share_database
        volumes:
            - mongo_data:/data/db

    mongo_express:
        image: mongo-express:latest
        ports:
            - '8081:8081'
        environment:
            ME_CONFIG_MONGODB_URL: mongodb://ride-share-mongo:27017/
            ME_CONFIG_BASICAUTH: false
        depends_on:
            - mongo

volumes:
    redis_data:
    mongo_data: